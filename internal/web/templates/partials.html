{{define "header"}}<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Forecast Tool</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header class="topbar">
  <div class="brand">📊 Forecast</div>
  <nav>
    <a href="/" class="{{if eq .Active "dashboard"}}active{{end}}">Dashboard</a>
    <a href="/week" class="{{if eq .Active "week"}}active{{end}}">Woche</a>
    <a href="/projects" class="{{if eq .Active "projects"}}active{{end}}">Projekte</a>
    <a href="/goal" class="{{if eq .Active "goal"}}active{{end}}">Ziel</a>
    <a href="/settings" class="{{if eq .Active "settings"}}active{{end}}">Einstellungen</a>
    <a href="/data" class="{{if eq .Active "data"}}active{{end}}">JSON</a>
  </nav>
  <div class="year">
    <form method="post" action="/fy" class="fyswitch">
      <label for="fySelect">FY</label>
      <select id="fySelect" name="year" onchange="this.form.submit()">
        {{range .FYYears}}<option value="{{.}}"{{if eq . $.Settings.Year}} selected{{end}}>{{.}}</option>{{end}}
      </select>
      <noscript><button type="submit">OK</button></noscript>
    </form>
    <span class="state">{{.Settings.FederalState}}</span>
  </div>
</header>
<main{{if .Wide}} class="wide"{{end}}>
{{end}}

{{define "footer"}}
</main>
<footer class="foot">Forecast Tool · Fiskaljahr {{.Settings.Year}} · Wochensoll {{hours .Settings.WeeklyTargetHours}} h</footer>
</body>
</html>
{{end}}
