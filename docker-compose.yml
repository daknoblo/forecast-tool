services:
  forecast:
    image: ghcr.io/daknoblo/forecast-tool:latest
    # To build locally instead of pulling, comment out "image:" above
    # and uncomment the build block below:
    # build: .
    container_name: forecast-tool
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      FORECAST_ADDR: ":8080"
      FORECAST_DATA_DIR: "/app/appdata"
    volumes:
      # Named volume: inherits the correct (non-root) ownership from the image,
      # so no manual chown is needed. Data lives under Docker's volume storage.
      - forecast-data:/app/appdata
      # Prefer a host folder instead? Comment the line above and use:
      #   - ./appdata:/app/appdata
      # Then create it once with the right owner:
      #   mkdir -p appdata && sudo chown -R 65532:65532 appdata

volumes:
  forecast-data:
