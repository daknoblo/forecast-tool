services:
  forecast:
    image: ghcr.io/daknoblo/forecast-tool:stable
    container_name: forecast-tool
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      FORECAST_ADDR: ":8080"
      FORECAST_DATA_DIR: "/appdata"
      TZ: "Europe/Berlin"
      # Optional: API-Key für den KI-Endpoint per Host-Env oder .env-Datei setzen.
      # FORECAST_AI_API_KEY: "${FORECAST_AI_API_KEY}"
    volumes:
      - forecast-data:/appdata
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  forecast-data:
